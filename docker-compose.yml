version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: pinc
      POSTGRES_PASSWORD: pinc
    ports:
      - "5432:5432"

  web:
    build: .
    command: ./bin/rails server -b 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      SECRET_KEY_BASE: 333fcacb69ebf31db888ef100b82889d141328e049c4bc857655750bcfcc2c171d4a7df3232656b5e6705e2c479247f72e9c18273c219a0699c4e07ac9fa313f
      DATABASE_URL: postgres://pinc:pinc@db:5432/myapp
    depends_on:
      - db